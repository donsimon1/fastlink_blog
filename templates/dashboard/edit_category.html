{% load static tailwind_tags %} {% load crispy_forms_tags %}
<!doctype html>
<html lang="en">
	<head>
		<title>FASTLINK ICT BLOG - Dashboard</title>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta http-equiv="X-UA-Compatible" content="ie=edge" />
		{% tailwind_css %}
	</head>
	<body class="font-jaka text-base bg-gray-50">
		<div class="min-h-screen flex">
			{% include 'dashboard/sidebar.html' %}

			<div class="bg-white shadow-lg rounded-lg p-8 w-full max-w-md">
				<div class="flex justify-center mb-6">
					<img src="{% static 'images/benue-logo.png' %}" alt="Logo" class="w-24" />
				</div>

				<h2 class="text-xl font-bold text-center mb-6 text-blue-600">
					Add Category
				</h2>

				<form action="{% url 'edit_category' category.id %}" method="POST" class="space-y-4">
					{% csrf_token %} 
          {{ form | crispy }}
					<button
						type="submit"
						class="w-full px-6 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition-colors">
						Edit Category
					</button>
				</form>
			</div>
		</div>

		<!-- Minimal JS for mobile sidebar toggle and accessibility -->
		<script>
			;(function () {
				const openBtn = document.getElementById("mobileSidebarOpen")
				const closeBtn = document.getElementById("mobileSidebarClose")
				const sidebar = document.getElementById("mobileSidebar")
				const overlay = document.getElementById("mobileSidebarOverlay")

				function openSidebar() {
					sidebar.classList.remove("-translate-x-full")
					sidebar.setAttribute("aria-hidden", "false")
					overlay.classList.remove("hidden")
					// prevent body scroll when sidebar open
					document.documentElement.style.overflow = "hidden"
				}

				function closeSidebar() {
					sidebar.classList.add("-translate-x-full")
					sidebar.setAttribute("aria-hidden", "true")
					overlay.classList.add("hidden")
					document.documentElement.style.overflow = ""
				}

				if (openBtn) openBtn.addEventListener("click", openSidebar)
				if (closeBtn) closeBtn.addEventListener("click", closeSidebar)
				if (overlay) overlay.addEventListener("click", closeSidebar)

				// Close on Escape
				document.addEventListener("keydown", function (e) {
					if (
						e.key === "Escape" &&
						!sidebar.classList.contains("-translate-x-full")
					) {
						closeSidebar()
					}
				})

				// Ensure sidebar is hidden when resizing to desktop
				window.addEventListener("resize", function () {
					if (window.innerWidth >= 768) {
						// reset mobile sidebar state
						sidebar.classList.add("-translate-x-full")
						sidebar.setAttribute("aria-hidden", "true")
						overlay.classList.add("hidden")
						document.documentElement.style.overflow = ""
					}
				})
			})()
		</script>
	</body>
</html>
