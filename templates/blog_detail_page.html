{% extends "base.html" %}
{% block content %}
<div>
  <h3 class="text-4xl text-blue-700 font-bold mb-4 mt-16">Featured Posts</h3>
	<div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
		
		<div class="bg-white p-8 rounded">
			<h3 class="text-2xl font-bold mb-2 text-blue-500 font-sora">
				{{ post.title }}
			</h3>
			<small class="text-gray-600 mb-1"
				>{{ post.updated_at| timesince }} | {{ post.author | capfirst }}</small
			>
			<p class="mt-2 text-gray-700">{{ post.blog_body|truncatechars:80 }}</p>
		</div>
		
	</div>
</div>
{% endblock %}
